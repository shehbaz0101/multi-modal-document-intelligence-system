# Production-ready docker-compose stack.
#
# Brings up: the DocIntel app + Qdrant + OpenSearch + Postgres
# in one network, with persistent volumes and proper healthchecks.
#
# Run:    docker compose up -d
# Logs:   docker compose logs -f docintel
# Stop:   docker compose down
# Reset:  docker compose down -v   (DESTRUCTIVE — wipes volumes)

services:

  # ── DocIntel API ─────────────────────────────────────────────────
  docintel:
    build: .
    image: docintel:latest
    container_name: docintel_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override URLs to point at sibling containers
      INDEX_VECTOR_URL: http://qdrant:6333
      INDEX_SPARSE_URL: http://opensearch:9200
      INDEX_METADATA_DB_URL: postgresql://docintel:docintel@postgres:5432/docintel
      STORAGE_ROOT: /app/data
    volumes:
      - app_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ── Vector DB ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: docintel_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── BM25 / sparse search ─────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: docintel_opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=DocIntel@dev1
      - plugins.security.disabled=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Metadata DB ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: docintel_postgres
    environment:
      POSTGRES_USER: docintel
      POSTGRES_PASSWORD: docintel
      POSTGRES_DB: docintel
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docintel"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  app_data:
  qdrant_storage:
  opensearch_data:
  pg_data: